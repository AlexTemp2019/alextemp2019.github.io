<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Advansed Search</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="navmenu">
            <a class="navitems" href="index.html" class="menu_link">Search</a>
            <a class="navitems" href="imgsearch.html" class="menu_link">Search images</a>
        </div>
    </div>

    <section class="header">
        <div class="header_advanced">
            <img class="advanced_backgroundImage" src="./img/googlelogo_color_272x92dp.png" alt="Google">
        </div>
        <div class="advanced_info">Advansed Search</div>
        <div class="delimiter"></div>
    </section>

    <section class="advanced">
        <div class="advanced_container">
            <form class="advanced_form" action="https://www.google.ru/search" method="GET">
                <div class="advanced_items">
                    <label class="title_condition"> Find pages with...</label>
                    <label class="title_space"></label>
                    <label class="title_description">To do this in the search box.</label>
                </div>
                <div class="advanced_items">
                    <label class="condition"> all these words:</label>
                    <input class="advanced_input" autofocus="autofocus" type="text" name="as_q">
                    <div class="description">
                        Type the important words: <span class="monospace">tri-colour rat terrier</span>
                    </div>
                </div>
                <div class="advanced_items">
                    <label class="condition">this exact word or phrase:</label>
                    <input class="advanced_input" type="text" name="as_epq">
                    <div class="description">
                        Put exact words in quotes:
                        <span class="monospace">"rat terrier"</span>
                    </div>
                </div>
                <div class="advanced_items">
                    <label class="condition"> any of these words: </label>
                    <input class="advanced_input" type="text" name="as_oq">
                    <div class="description">
                        Type OR between all the words you want:
                        <span class="monospace">miniature OR standard</span>
                    </div>
                </div>
                <div class="advanced_items">
                    <label class="condition">none of these words:</label>
                    <input class="advanced_input" type="text" name="as_eq">
                    <div class="description">
                        Put a minus sign just before words that you don't want:
                        <span class="monospace">-rodent, -"Jack Russell"</span>
                    </div>
                </div>
                <div class="advanced_items">
                    <label class="condition_button"></label>
                    <input type="submit" class="advanced_input_button jfk-button jfk-button-action dUBGpe"
                        value="Advanced Search">
                    <div class="description_button"></div>
                </div>
            </form>

        </div>
    </section>

</body>

</html>
