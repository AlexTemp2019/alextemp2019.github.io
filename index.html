<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Search</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="navmenu">
            <a class="navitems" href="imgsearch.html" class="menu_link">Search images</a>
            <a class="navitems" href="advancedsearch.html" class="menu_link">Advansed Search</a>
        </div>
    </div>

    <section class="header">
        <div class="container">
            <div class="header_background">
                <img class="header_backgroundImage" src="./img/googlelogo_color_272x92dp.png" alt="Google">
            </div>
        </div>
    </section>

    <section class="search">
        <div class="container">
            <div class="search_form">
                <form class="form" action="https://google.com/search" method="GET" role="search">
                    <input class="form_input" type="text" name="q" value placeholder="Search Google or type a URL"
                        required>
                    <div class="buttongroup">
                        <input class="form_submit" type="submit" value="Google Search">
                        <input class="form_submit" name="btnI" type="submit" value="I'm Feeling Lucky">
                    </div>
                </form>
            </div>
        </div>
    </section>

</body>

</html>
